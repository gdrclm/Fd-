<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Бургер-Калькулятор</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <h1>🍔 Бургер‑калькулятор</h1>
      <div class="meta-row">
        <p id="level-info" class="level-info">Уровень 1</p>
        <p id="timer" class="timer">⏱ 01:00</p>
      </div>
      <p id="level-hint" class="hint">
        Перетаскивай ингредиенты в бургер игрока в правильные места и уложись в 1 минуту. Нажми на ингредиент внизу, чтобы открыть/скрыть его название.
      </p>

      <section class="preview-grid">
        <section class="reference" aria-label="Пример правильного бургера">
          <h2>Эталонный бургер</h2>
          <div id="reference-stack" class="burger-canvas" role="img" aria-label="Эталонный бургер"></div>
        </section>

        <section class="display" aria-live="polite">
          <h2>Твой бургер (drop zone)</h2>
          <div id="stack" class="burger-canvas burger-dropzone scene-root" role="img" aria-label="Бургер игрока"></div>
          <p id="status" class="status">Перетащи «Нижнюю булочку» в бургер.</p>
        </section>
      </section>

      <section id="ingredients" class="ingredients-tray" aria-label="Ингредиенты для перетаскивания"></section>

      <div class="controls">
        <button type="button" id="check" class="check">Проверить</button>
        <button type="button" id="clear" class="clear">Сбросить</button>
      </div>
    </main>
    <div id="level-complete-overlay" class="level-complete-overlay" hidden>
      <div class="level-complete-card">
        <div id="fx-layer" class="fx-layer" aria-hidden="true"></div>
        <div id="celebration-burger" class="celebration-burger" role="img" aria-label="Твой бургер"></div>
        <h2 id="overlay-title" class="overlay-title">Уровень пройден</h2>
        <div id="score-breakdown" class="score-breakdown" aria-live="polite"></div>
        <div class="overlay-actions">
          <button type="button" id="restart-level" class="overlay-button clear">Начать заново</button>
          <button type="button" id="next-level" class="overlay-button check">Следующий уровень</button>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/pixi.js@7.4.2/dist/pixi.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/matter-js@0.20.0/build/matter.min.js"></script>
    <script type="module" src="js/main.js"></script>
  </body>
</html>
